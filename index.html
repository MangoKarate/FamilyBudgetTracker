<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <title>Family Budget v3</title>
  <style>
    :root{--bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--text2:#64748b;--text3:#94a3b8;--blue:#2563eb;--green:#059669;--red:#dc2626;--radius:12px;--safe-b:env(safe-area-inset-bottom,0px)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;min-height:100dvh;overflow-x:hidden;padding-bottom:calc(70px + var(--safe-b))}

    /* Top bar */
    .topbar{position:sticky;top:0;z-index:40;background:#0f172a;color:#fff;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));display:flex;flex-direction:column;gap:8px}
    .topbar-row{display:flex;align-items:center;justify-content:space-between}
    .topbar-title{font-size:1.05rem;font-weight:700;letter-spacing:-.3px}
    .topbar-actions{display:flex;gap:4px}
    .topbar-btn{background:rgba(255,255,255,.12);border:none;color:#fff;width:36px;height:36px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
    .topbar-btn:active{background:rgba(255,255,255,.25)}
    .month-row{display:flex;align-items:center;justify-content:center;gap:12px}
    .month-arrow{background:none;border:none;color:rgba(255,255,255,.7);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:8px}
    .month-arrow:active{background:rgba(255,255,255,.1)}
    .month-name{font-size:1.1rem;font-weight:600;min-width:160px;text-align:center}
    .topbar-updated{font-size:.65rem;font-weight:400;color:rgba(255,255,255,.45);margin-left:8px}

    .content{padding:12px 14px 20px}

    /* Summary cards */
    .sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
    .sum-card.full{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between}
    .sum-label{font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
    .sum-val{font-size:1.15rem;font-weight:700;font-variant-numeric:tabular-nums}
    .sum-val.pos{color:var(--green)}.sum-val.neg{color:var(--red)}.sum-val.neu{color:var(--text)}
    .sum-progress{display:flex;align-items:center;gap:8px}
    .sum-progress-text{font-size:.85rem;font-weight:600;color:var(--text)}
    .sum-progress-bar{flex:1;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
    .sum-progress-fill{height:100%;border-radius:3px;transition:width .3s}

    /* Start balance & link */
    .start-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
    .start-label{font-size:.85rem;font-weight:600;color:var(--text2);white-space:nowrap}
    .start-input{flex:1;border:none;font-size:1rem;font-weight:600;text-align:right;font-family:inherit;color:var(--text);background:transparent;min-width:0}
    .start-input:focus{outline:none}
    .link-btn{background:var(--red);color:#fff;border:none;font-size:.75rem;font-weight:700;padding:6px 10px;border-radius:6px;cursor:pointer;white-space:nowrap}
    .link-btn:active{opacity:.8}

    /* Transaction cards */
    .txn-list{display:flex;flex-direction:column;gap:6px}
    .txn-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;gap:12px;align-items:flex-start;position:relative;transition:background .15s;border-left:3px solid var(--border)}
    .txn-card.income{border-left-color:var(--green);background:rgba(16,185,129,.03)}
    .txn-card.transfer{border-left-color:#64748b;background:rgba(100,116,139,.02)}
    .txn-card.confirmed{opacity:.85}
    .txn-card.confirmed .txn-desc{color:var(--text2)}
    .txn-card.sel{background:#eff6ff;border-color:#93c5fd}
    .txn-body{flex:1;min-width:0}
    .txn-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
    .txn-desc{font-size:.95rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .txn-amt{font-size:.95rem;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0}
    .txn-amt.pos{color:var(--green)}.txn-amt.neg{color:var(--text)}.txn-amt.zero{color:var(--text3)}
    .txn-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
    .txn-day{font-size:.75rem;font-weight:600;color:var(--text3);background:#f1f5f9;padding:1px 6px;border-radius:4px}
    .txn-co{font-size:.8rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
    .txn-cat{font-size:.7rem;font-weight:500;color:#fff;padding:1px 7px;border-radius:8px;white-space:nowrap}
    .txn-bal{font-size:.75rem;font-weight:600;color:var(--text2);margin-left:auto;font-variant-numeric:tabular-nums}
    .txn-note{font-size:.8rem;color:var(--text3);font-style:italic;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .txn-edited{font-size:.75rem;color:var(--text3);margin-top:2px}
    .txn-edited s{color:#c4b5a8}
    .txn-check{width:28px;height:28px;border:2px solid #d1d5db;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s;margin-top:2px}
    .txn-check:active{transform:scale(.9)}
    .txn-check.on{background:var(--green);border-color:var(--green);color:#fff}
    .txn-sel{width:22px;height:22px;accent-color:var(--blue);cursor:pointer;flex-shrink:0;margin-top:4px}

    /* Day separator */
    .day-sep{font-size:.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:10px 4px 4px}

    /* Ending balance */
    .end-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
    .end-label{font-size:.85rem;font-weight:600;color:var(--text2)}
    .end-val{font-size:1.1rem;font-weight:700;font-variant-numeric:tabular-nums}

    /* Timestamps */
    .ts-row{display:flex;gap:12px;margin-top:10px;font-size:.7rem;color:var(--text3);justify-content:center}
    .ts-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px}
    .ts-fresh{background:#10b981}.ts-stale{background:#f59e0b}.ts-old{background:#ef4444;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* Bulk bar */
    .bulk-bar{position:fixed;bottom:calc(66px + var(--safe-b));left:0;right:0;background:#1e40af;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:35;box-shadow:0 -2px 12px rgba(0,0,0,.15)}
    .bulk-count{font-size:.9rem;font-weight:600}
    .bulk-btns{display:flex;gap:8px}
    .bulk-btn{background:rgba(255,255,255,.2);color:#fff;border:none;padding:7px 14px;font-size:.8rem;font-weight:600;border-radius:6px;cursor:pointer}
    .bulk-btn:active{background:rgba(255,255,255,.35)}
    .bulk-btn.danger{background:rgba(239,68,68,.8)}

    /* Bottom nav */
    .bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:40;padding-bottom:var(--safe-b)}
    .bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;border:none;background:none;color:var(--text3);font-size:.65rem;font-weight:600;cursor:pointer;transition:color .15s}
    .bnav-btn.active{color:var(--blue)}
    .bnav-btn:active{background:#f8fafc}
    .bnav-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center}

    /* Empty */
    .empty{text-align:center;padding:48px 20px;color:var(--text3)}

    /* Sheets (bottom sheet modals) */
    .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center}
    .sheet{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:92vh;overflow:auto;padding-bottom:var(--safe-b)}
    .sheet-handle{width:36px;height:4px;background:#d1d5db;border-radius:2px;margin:10px auto}
    .sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px 18px 14px}
    .sheet-title{font-size:1.05rem;font-weight:700;color:var(--text)}
    .sheet-close{border:none;background:none;color:var(--text3);padding:4px;cursor:pointer;border-radius:8px}
    .sheet-close:active{background:#f1f5f9}
    .sheet-body{padding:0 18px 20px}
    .fg{margin-bottom:14px}
    .fg-label{display:block;font-size:.75rem;font-weight:600;color:var(--text2);margin-bottom:4px}
    .fg-input,.fg-select,.fg-textarea{width:100%;padding:10px 12px;font-size:.95rem;border:1px solid var(--border);border-radius:8px;font-family:inherit;background:var(--card)}
    .fg-input:focus,.fg-select:focus,.fg-textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    .fg-textarea{resize:vertical;min-height:60px}
    .fg-row{display:flex;gap:10px}
    .fg-row .fg{flex:1}
    .sheet-actions{display:flex;gap:8px;padding:14px 18px;border-top:1px solid var(--border)}
    .sheet-actions .btn{flex:1;justify-content:center}
    .btn-full{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;font-size:.95rem;font-weight:600;border-radius:10px;border:none;cursor:pointer;transition:all .15s}
    .btn-full.primary{background:var(--blue);color:#fff}
    .btn-full.primary:active{background:#1d4ed8}
    .btn-full.secondary{background:#f1f5f9;color:var(--text2);border:1px solid var(--border)}
    .btn-full.danger{background:var(--red);color:#fff}
    .btn-full.danger:active{background:#b91c1c}

    /* Confirm sheet */
    .conf-amount{font-size:1.5rem;font-weight:700;text-align:center;margin:8px 0 4px}
    .conf-desc{font-size:.9rem;color:var(--text2);text-align:center;margin-bottom:16px}
    .conf-q{font-size:.95rem;font-weight:500;color:var(--text);text-align:center;margin-bottom:16px}
    .conf-edit-input{width:100%;padding:12px;font-size:1.1rem;font-weight:600;border:1px solid var(--border);border-radius:10px;text-align:center;font-family:inherit;margin-bottom:14px}
    .conf-edit-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

    /* Pull list */
    .pull-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #f1f5f9}
    .pull-item:last-child{border-bottom:none}
    .pull-cb{width:20px;height:20px;accent-color:var(--blue);flex-shrink:0}
    .pull-desc{flex:1;font-size:.9rem;color:var(--text)}
    .pull-amt{font-size:.85rem;font-weight:600;font-variant-numeric:tabular-nums}
    .pull-info{text-align:center;padding:10px;background:#f8fafc;border-radius:8px;margin-bottom:12px;font-size:.85rem;color:var(--text2)}
    .pull-info strong{color:var(--blue)}

    /* Menu sheet */
    .menu-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid #f1f5f9;font-size:.95rem;color:var(--text);cursor:pointer}
    .menu-item:last-child{border-bottom:none}
    .menu-item:active{opacity:.7}
    .menu-item.danger{color:var(--red)}
    .menu-icon{width:20px;height:20px;color:var(--text2);display:flex;align-items:center;justify-content:center}
    .menu-item.danger .menu-icon{color:var(--red)}

    /* Toast */
    .toast{position:fixed;top:max(16px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:.875rem;font-weight:500;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:toastIn .25s,toastOut .25s 2s forwards}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes toastOut{from{opacity:1}to{opacity:0}}

    /* Print styles */
    @media print{
      *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
      body{background:#fff!important;font-size:11px!important;padding:0!important}
      .topbar,.bnav,.bulk-bar,.sheet-bg,.topbar-updated{display:none!important}
      .content{padding:0!important}
      .print-header{display:flex!important;align-items:center;justify-content:space-between;padding:14px 0 10px;border-bottom:2px solid #1e293b;margin-bottom:10px}
      .print-title{font-size:15px;font-weight:700}.print-date{font-size:9px;color:#94a3b8}
      .sum-grid{gap:6px!important;margin-bottom:10px!important}
      .sum-card{padding:8px!important;border:1px solid #ccc!important}
      .sum-label{font-size:7px!important}.sum-val{font-size:11px!important}
      .start-row{padding:6px 10px!important;margin-bottom:8px!important;border:1px solid #ccc!important}
      .start-label{font-size:10px!important}.start-input{font-size:11px!important}
      .link-btn{display:none!important}
      .day-sep{font-size:8px!important;padding:8px 0 2px!important}
      .txn-card{padding:8px 10px!important;border-radius:6px!important;page-break-inside:avoid}
      .txn-desc{font-size:11px!important}.txn-amt{font-size:11px!important}
      .txn-meta{gap:4px!important}.txn-day,.txn-co,.txn-bal{font-size:8px!important}
      .txn-cat{font-size:7px!important;padding:1px 5px!important}
      .txn-note{font-size:8px!important}
      .txn-check,.txn-sel{display:none!important}
      .end-row{padding:10px 0!important;border:none!important;border-top:2px solid #1e293b!important;margin-top:8px!important}
      .end-label{font-size:11px!important}.end-val{font-size:13px!important}
      .ts-row{display:none!important}
      @page{size:letter;margin:.6in .5in}
    }
    .print-header{display:none}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const SK='familyBudgetV1';
const DEF_CATS=[
  {name:'Income',color:'#059669'},{name:'Loan',color:'#B91C1C'},{name:'Utilities',color:'#0891B2'},
  {name:'Home',color:'#92400E'},{name:'Entertainment',color:'#7C3AED'},{name:'Insurance',color:'#4F46E5'},
  {name:'Memberships',color:'#DB2777'},{name:'Subscription',color:'#CA8A04'},{name:'Recreation',color:'#0D9488'},
  {name:'Transfer',color:'#64748B'},{name:'Education',color:'#1D4ED8'},{name:'Medical',color:'#DC2626'},
  {name:'Personal',color:'#78350F'},{name:'Credit Card',color:'#9333EA'},{name:'Holiday',color:'#BE185D'},
];
const TYPES=['ACH','EFT','Debit','Credit','Check','Venmo','ATM','Other'];
const FREQS=['Monthly','Bi-Weekly','Weekly','Annual','Quarterly','One-Time','Periodic'];

function gid(){return 'i'+Date.now()+'_'+Math.random().toString(36).substr(2,8)}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function fmt(n){if(n==null)return'—';const a=Math.abs(n),s=a.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return n<0?'-$'+s:n>0?'+$'+s:'$'+s}
function fmtBal(n){if(n==null)return'—';const a=Math.abs(n),s=a.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});return n<0?'-$'+s:'$'+s}
function amtCls(n){return n>0?'pos':n<0?'neg':'zero'}
function eff(t){return(t.confirmed&&t.actual!==null)?t.actual:t.projected}
function delta(t){if(!t.confirmed)return t.projected;if(t.actual===null)return 0;return t.projected-t.actual}
function catCol(n){const c=D.categories.find(c=>c.name===n);return c?c.color:'#94a3b8'}
function pk(k){const[y,m]=k.split('.');return{year:+y,month:+m}}
function ml(k){const{year,month}=pk(k);return MONTHS[month-1]+' '+year}
function mk(y,m){return y+'.'+String(m).padStart(2,'0')}
function pm(k){let{year,month}=pk(k);month--;if(month<1){month=12;year--}return mk(year,month)}
function nm(k){let{year,month}=pk(k);month++;if(month>12){month=1;year++}return mk(year,month)}
function fmtTs(iso){if(!iso)return'Never';const d=new Date(iso),now=new Date(),diff=now-d,mins=Math.floor(diff/60000);if(mins<1)return'Just now';if(mins<60)return mins+'m ago';const hrs=Math.floor(mins/60);if(hrs<24)return hrs+'h ago';const days=Math.floor(hrs/24);if(days<7)return days+'d ago';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function bkCls(iso){if(!iso)return'ts-old';const d=Date.now()-new Date(iso).getTime();return d<86400000?'ts-fresh':d<259200000?'ts-stale':'ts-old'}

let D={categories:[],months:{},lastUpdated:null,lastBackup:null};
let cur='2026.01';
let sheet=null; // 'add','edit','confirm','pull','menu'
let editId=null,confId=null,confEditing=false;
let selMode=false;
let selected=new Set();
let tab='txns'; // 'txns','summary'

function load(){const s=localStorage.getItem(SK);if(s){D=JSON.parse(s);Object.values(D.months).forEach(m=>m.transactions.forEach((t,i)=>{if(t.order===undefined)t.order=i}))}else{D={categories:[...DEF_CATS],months:{},lastUpdated:new Date().toISOString(),lastBackup:null};save()}const ks=Object.keys(D.months).sort();if(ks.length)cur=ks[ks.length-1]}
function save(){D.lastUpdated=new Date().toISOString();localStorage.setItem(SK,JSON.stringify(D))}
function ensure(k){if(!D.months[k])D.months[k]={startingBalance:0,transactions:[]}}
function getM(){ensure(cur);return D.months[cur]}
function allKeys(){return Object.keys(D.months).sort()}
function sortTxns(t){return[...t].sort((a,b)=>a.day-b.day||(a.order||0)-(b.order||0))}
function balances(txns,start){let b=start;return txns.map(t=>{b+=delta(t);return{...t,_bal:b}})}
function endBal(m,s){let b=s;m.transactions.forEach(t=>{b+=delta(t)});return b}
function getPrevEnd(){const p=pm(cur);if(!D.months[p])return null;const m=D.months[p];return endBal(m,m.startingBalance)}
function summary(){const m=getM(),s=m.startingBalance;let inc=0,exp=0;m.transactions.forEach(t=>{const v=eff(t);if(v>0)inc+=v;else exp+=v});return{start:s,income:inc,expenses:exp,ending:endBal(m,s),confirmed:m.transactions.filter(t=>t.confirmed).length,total:m.transactions.length}}

function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2400)}

// Actions
function setMonth(k){ensure(k);cur=k;sheet=null;selected.clear();selMode=false;render()}
function setStartBal(v){const n=parseFloat(v);if(isNaN(n))return;getM().startingBalance=n;save();render()}
function linkPrev(){const p=getPrevEnd();if(p===null){alert('No previous month.');return}getM().startingBalance=p;save();render();toast('Linked to '+ml(pm(cur)))}
function addTxn(d){const m=getM(),same=m.transactions.filter(t=>t.day===d.day),mx=same.length?Math.max(...same.map(t=>t.order||0)):(-1);d.order=mx+1;m.transactions.push({id:gid(),...d,confirmed:false,actual:null});save();sheet=null;render();toast('Added')}
function updateTxn(id,u){const t=getM().transactions.find(t=>t.id===id);if(t)Object.assign(t,u);save();render()}
function deleteTxn(id){getM().transactions=getM().transactions.filter(t=>t.id!==id);save();editId=null;sheet=null;selected.delete(id);render();toast('Deleted')}
function cloneTxn(id){const m=getM(),t=m.transactions.find(t=>t.id===id);if(!t)return;const same=m.transactions.filter(x=>x.day===t.day);m.transactions.push({...t,id:gid(),confirmed:false,actual:null,order:Math.max(...same.map(x=>x.order||0))+1});save();render();toast('Cloned')}
function confirmTxn(id,amt){const t=getM().transactions.find(t=>t.id===id);if(!t)return;t.confirmed=true;t.actual=(amt!==t.projected)?amt:null;save();sheet=null;confId=null;render()}
function unconfirmTxn(id){const t=getM().transactions.find(t=>t.id===id);if(!t)return;t.confirmed=false;t.actual=null;save();render()}
function moveUp(id){const m=getM(),t=m.transactions.find(x=>x.id===id);if(!t)return;const sorted=sortTxns(m.transactions),idx=sorted.findIndex(x=>x.id===id);if(idx<=0||sorted[idx-1].day!==t.day)return;const prev=sorted[idx-1],tmp=t.order;t.order=prev.order;prev.order=tmp;save();render()}
function moveDown(id){const m=getM(),t=m.transactions.find(x=>x.id===id);if(!t)return;const sorted=sortTxns(m.transactions),idx=sorted.findIndex(x=>x.id===id);if(idx>=sorted.length-1||sorted[idx+1].day!==t.day)return;const nxt=sorted[idx+1],tmp=t.order;t.order=nxt.order;nxt.order=tmp;save();render()}
function bulkDelete(){const n=selected.size;if(!confirm('Delete '+n+' transaction(s)?'))return;getM().transactions=getM().transactions.filter(t=>!selected.has(t.id));selected.clear();selMode=false;save();render();toast('Deleted '+n)}
function bulkCopy(){const m=getM();let c=0;selected.forEach(id=>{const t=m.transactions.find(t=>t.id===id);if(t){const same=m.transactions.filter(x=>x.day===t.day);m.transactions.push({...t,id:gid(),confirmed:false,actual:null,order:Math.max(...same.map(x=>x.order||0))+1+c});c++}});selected.clear();selMode=false;save();render();toast('Copied '+c)}
function pullTxns(src,ids){const s=D.months[src];if(!s)return;const m=getM();ids.forEach(id=>{const t=s.transactions.find(t=>t.id===id);if(t){const same=m.transactions.filter(x=>x.day===t.day);m.transactions.push({...t,id:gid(),confirmed:false,actual:null,order:(same.length?Math.max(...same.map(x=>x.order||0)):(-1))+1})}});save();sheet=null;render();toast('Pulled '+ids.length)}
function createNewMonth(){const next=nm(cur);if(D.months[next]){setMonth(next);return}const s=summary();D.months[next]={startingBalance:s.ending,transactions:[]};save();cur=next;sheet='pull';render();toast('Created '+ml(next))}
function deleteMonth(){if(!confirm('Delete '+ml(cur)+'?'))return;delete D.months[cur];const ks=allKeys();cur=ks.length?ks[ks.length-1]:mk(new Date().getFullYear(),new Date().getMonth()+1);ensure(cur);save();sheet=null;render();toast('Month deleted')}
function exportData(){D.lastBackup=new Date().toISOString();save();const j=JSON.stringify(D,null,2),b=new Blob([j],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');const d=new Date(),ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');a.href=u;a.download='family-budget-'+ds+'.json';a.click();URL.revokeObjectURL(u);sheet=null;render();toast('Exported')}
function importData(f){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.categories||!d.months){alert('Invalid file.');return}if(!confirm('Replace all data?'))return;D=d;save();const ks=allKeys();cur=ks.length?ks[ks.length-1]:'2026.01';ensure(cur);selected.clear();sheet=null;render();toast('Imported')}catch(e){alert('Error: '+e.message)}};r.readAsText(f)}

function printReport(){sheet=null;render();setTimeout(()=>window.print(),100)}

function catOpts(sel){return D.categories.map(c=>`<option value="${esc(c.name)}"${sel===c.name?' selected':''}>${esc(c.name)}</option>`).join('')}
function typeOpts(sel){return TYPES.map(t=>`<option value="${t}"${sel===t?' selected':''}>${t}</option>`).join('')}
function freqOpts(sel){return FREQS.map(f=>`<option value="${f}"${sel===f?' selected':''}>${f}</option>`).join('')}

};

function render(){
  const m=getM(),s=summary(),txns=sortTxns(m.transactions),withBal=balances(txns,s.start),balMap={};
  withBal.forEach(t=>{balMap[t.id]=t._bal});
  const hasPrev=getPrevEnd()!==null;
  let h='';

  // Top bar
  h+=`<div class="topbar"><div class="topbar-row"><div class="topbar-title">Family Budget v3<span class="topbar-updated">Updated ${fmtTs(D.lastUpdated)}</span></div><div class="topbar-actions"><button class="topbar-btn" onclick="selMode=!selMode;selected.clear();render()" title="Select">${IC.sel}</button><button class="topbar-btn" onclick="sheet='menu';render()" title="More">${IC.menu}</button></div></div><div class="month-row"><button class="month-arrow" onclick="setMonth(pm(cur))">${IC.chL}</button><div class="month-name">${ml(cur)}</div><button class="month-arrow" onclick="setMonth(nm(cur))">${IC.chR}</button></div></div>`;

  h+='<div class="content">';

  // Print-only header
  const printDate=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  h+=`<div class="print-header"><div><div class="print-title">Family Budget — ${ml(cur)}</div><div class="print-date">Printed ${printDate}</div></div><div style="text-align:right;font-size:11px;color:#475569">Starting: ${fmtBal(s.start)}</div></div>`;

  // Summary cards
  const pct=s.total?Math.round(s.confirmed/s.total*100):0;
  const pctCol=pct===100?'#10b981':pct>=50?'#2563eb':'#f59e0b';
  h+=`<div class="sum-grid">
    <div class="sum-card"><div class="sum-label">Income</div><div class="sum-val pos">${fmtBal(s.income)}</div></div>
    <div class="sum-card"><div class="sum-label">Expenses</div><div class="sum-val neg">${fmtBal(s.expenses)}</div></div>
    <div class="sum-card full"><div><div class="sum-label">Confirmed</div><div class="sum-progress"><span class="sum-progress-text">${s.confirmed}/${s.total}</span><div class="sum-progress-bar"><div class="sum-progress-fill" style="width:${pct}%;background:${pctCol}"></div></div></div></div></div>
  </div>`;

  // Start balance
  h+=`<div class="start-row">${hasPrev?`<button class="link-btn" onclick="linkPrev()">Link to Previous</button>`:''}<span class="start-label">Starting Bal:</span><input type="text" class="start-input" inputmode="decimal" value="${m.startingBalance.toFixed(2)}" onchange="setStartBal(this.value)"></div>`;

  // Transaction list
  if(txns.length===0){
    h+='<div class="empty">No transactions yet.</div>';
  } else {
    h+='<div class="txn-list">';
    let lastDay=-1;
    txns.forEach(t=>{
      if(t.day!==lastDay){h+=`<div class="day-sep">Day ${t.day}</div>`;lastDay=t.day}
      const v=eff(t),bal=balMap[t.id],edited=t.confirmed&&t.actual!==null;
      const cls=['txn-card',v>0?'income':t.category==='Transfer'?'transfer':'',t.confirmed?'confirmed':'',selected.has(t.id)?'sel':''].filter(Boolean).join(' ');
      const amtStr=edited?`<span class="txn-edited"><s>${fmt(t.projected)}</s> → ${fmt(t.actual)}</span>`:fmt(t.projected);

      h+=`<div class="${cls}" onclick="${selMode?`toggleSel('${t.id}')`:`editId='${t.id}';sheet='edit';render()`}">`;
      if(selMode)h+=`<input type="checkbox" class="txn-sel" ${selected.has(t.id)?'checked':''} onclick="event.stopPropagation();toggleSel('${t.id}')">`;
      h+=`<div class="txn-body">
        <div class="txn-top"><span class="txn-desc">${esc(t.description)}</span><span class="txn-amt ${amtCls(v)}">${amtStr}</span></div>
        <div class="txn-meta"><span class="txn-day">${t.day}</span><span class="txn-co">${esc(t.company||'')}</span><span class="txn-cat" style="background:${catCol(t.category)}">${esc(t.category)}</span><span class="txn-bal">${fmtBal(bal)}</span></div>
        ${t.note?`<div class="txn-note">${esc(t.note.split('\\n')[0].substring(0,60))}</div>`:''}
      </div>`;
      if(!selMode)h+=`<div class="txn-check ${t.confirmed?'on':''}" onclick="event.stopPropagation();${t.confirmed?`unconfirmTxn('${t.id}')`:(`confId='${t.id}';confEditing=false;sheet='confirm';render()`)}">${t.confirmed?IC.check:''}</div>`;
      h+='</div>';
    });
    h+='</div>';
  }

  // Ending balance
  h+=`<div class="end-row"><span class="end-label">Ending Balance</span><span class="end-val" style="color:${s.ending>=0?'var(--green)':'var(--red)'}">${fmtBal(s.ending)}</span></div>`;
  h+=`<div class="ts-row"><span>Updated: ${fmtTs(D.lastUpdated)}</span><span><span class="ts-dot ${bkCls(D.lastBackup)}"></span>Backup: ${fmtTs(D.lastBackup)}</span></div>`;

  h+='</div>'; // content

  // Bulk bar
  if(selMode&&selected.size>0){
    h+=`<div class="bulk-bar"><span class="bulk-count">${selected.size} selected</span><div class="bulk-btns"><button class="bulk-btn" onclick="bulkCopy()">${IC.copy} Copy</button><button class="bulk-btn danger" onclick="bulkDelete()">${IC.trash} Delete</button><button class="bulk-btn" onclick="selected.clear();selMode=false;render()">Done</button></div></div>`;
  }

  // Bottom nav
  h+=`<div class="bnav">
    <button class="bnav-btn active" onclick="sheet='add';render()"><div class="bnav-icon">${IC.plus}</div>Add</button>
    <button class="bnav-btn" onclick="sheet='pull';render()"><div class="bnav-icon">${IC.pull}</div>Pull</button>
    <button class="bnav-btn" onclick="createNewMonth()"><div class="bnav-icon">${IC.cal}</div>New Month</button>
    <button class="bnav-btn" onclick="sheet='menu';render()"><div class="bnav-icon">${IC.menu}</div>More</button>
  </div>`;

  // --- Sheets ---

  // Add
  if(sheet==='add'){h+=`<div class="sheet-bg" onclick="sheet=null;render()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-hdr"><span class="sheet-title">Add Transaction</span><button class="sheet-close" onclick="sheet=null;render()">${IC.x}</button></div><div class="sheet-body">
    <div class="fg-row"><div class="fg" style="flex:0 0 70px"><label class="fg-label">Day</label><input type="number" class="fg-input" id="aDay" min="1" max="31" value="1" inputmode="numeric"></div><div class="fg"><label class="fg-label">Description</label><input class="fg-input" id="aDesc" placeholder="Mortgage Payment"></div></div>
    <div class="fg"><label class="fg-label">Company</label><input class="fg-input" id="aCo" placeholder="Freedom Mortgage"></div>
    <div class="fg-row"><div class="fg"><label class="fg-label">Category</label><select class="fg-select" id="aCat">${catOpts('Loan')}</select></div><div class="fg"><label class="fg-label">Type</label><select class="fg-select" id="aType">${typeOpts('EFT')}</select></div></div>
    <div class="fg-row"><div class="fg"><label class="fg-label">Frequency</label><select class="fg-select" id="aFreq">${freqOpts('Monthly')}</select></div><div class="fg"><label class="fg-label">Amount</label><input type="number" step="0.01" class="fg-input" id="aAmt" placeholder="-3300" inputmode="decimal"></div></div>
    <div class="fg"><label class="fg-label">Note</label><textarea class="fg-textarea" id="aNote" rows="2"></textarea></div>
    <button class="btn-full primary" onclick="submitAdd()">Add Transaction</button>
  </div></div></div>`}

  // Edit
  if(sheet==='edit'&&editId){const t=getM().transactions.find(t=>t.id===editId);if(t){const sorted=sortTxns(getM().transactions),idx=sorted.findIndex(x=>x.id===editId),cUp=idx>0&&sorted[idx-1].day===t.day,cDn=idx<sorted.length-1&&sorted[idx+1].day===t.day;
    h+=`<div class="sheet-bg" onclick="sheet=null;editId=null;render()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-hdr"><span class="sheet-title">Edit Transaction</span><button class="sheet-close" onclick="sheet=null;editId=null;render()">${IC.x}</button></div><div class="sheet-body">
    <div class="fg-row"><div class="fg" style="flex:0 0 70px"><label class="fg-label">Day</label><input type="number" class="fg-input" id="eDay" value="${t.day}" min="1" max="31" inputmode="numeric"></div><div class="fg"><label class="fg-label">Description</label><input class="fg-input" id="eDesc" value="${esc(t.description)}"></div></div>
    <div class="fg"><label class="fg-label">Company</label><input class="fg-input" id="eCo" value="${esc(t.company||'')}"></div>
    <div class="fg-row"><div class="fg"><label class="fg-label">Category</label><select class="fg-select" id="eCat">${catOpts(t.category)}</select></div><div class="fg"><label class="fg-label">Type</label><select class="fg-select" id="eType">${typeOpts(t.type)}</select></div></div>
    <div class="fg-row"><div class="fg"><label class="fg-label">Frequency</label><select class="fg-select" id="eFreq">${freqOpts(t.frequency)}</select></div><div class="fg"><label class="fg-label">Amount</label><input type="number" step="0.01" class="fg-input" id="eAmt" value="${t.projected}" inputmode="decimal"></div></div>
    <div class="fg"><label class="fg-label">Note</label><textarea class="fg-textarea" id="eNote" rows="2">${esc(t.note||'')}</textarea></div>
    <div style="font-size:.85rem;color:${t.confirmed?'var(--green)':'#ca8a04'};margin-bottom:14px;font-weight:500">${t.confirmed?'✓ Confirmed'+(t.actual!==null?' — actual: '+fmt(t.actual):''):'⏳ Pending'}</div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn-full secondary" style="flex:0 0 auto;padding:10px" onclick="moveUp('${t.id}');editId='${t.id}';render()" ${cUp?'':'disabled'}>${IC.up}</button>
      <button class="btn-full secondary" style="flex:0 0 auto;padding:10px" onclick="moveDown('${t.id}');editId='${t.id}';render()" ${cDn?'':'disabled'}>${IC.dn}</button>
      <button class="btn-full secondary" style="flex:1" onclick="cloneTxn('${t.id}');sheet=null;editId=null">${IC.copy} Clone</button>
    </div>
    <button class="btn-full primary" onclick="submitEdit('${t.id}')">Save Changes</button>
    <div style="height:10px"></div>
    <button class="btn-full danger" onclick="if(confirm('Delete?'))deleteTxn('${t.id}')">Delete Transaction</button>
  </div></div></div>`}}

  // Confirm
  if(sheet==='confirm'&&confId){const t=getM().transactions.find(t=>t.id===confId);if(t){
    h+=`<div class="sheet-bg" onclick="sheet=null;confId=null;render()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-hdr"><span class="sheet-title">Confirm Transaction</span><button class="sheet-close" onclick="sheet=null;confId=null;render()">${IC.x}</button></div><div class="sheet-body">
    <div class="conf-desc">${esc(t.description)}</div>
    ${!confEditing?`<div class="conf-amount">${fmt(t.projected)}</div><div class="conf-q">Is this amount correct?</div><div style="display:flex;gap:10px"><button class="btn-full primary" onclick="confirmTxn('${t.id}',${t.projected})">Confirm</button><button class="btn-full secondary" onclick="confEditing=true;render()">Edit Amount</button></div>`
    :`<div class="conf-q">Enter the actual amount:</div><input type="number" step="0.01" class="conf-edit-input" id="confInp" value="${t.projected}" inputmode="decimal"><div style="display:flex;gap:10px"><button class="btn-full primary" onclick="const v=parseFloat(document.getElementById('confInp').value);if(!isNaN(v))confirmTxn('${t.id}',v)">Save</button><button class="btn-full secondary" onclick="sheet=null;confId=null;render()">Cancel</button></div>`}
  </div></div></div>`}}

  // Pull
  if(sheet==='pull'){const other=allKeys().filter(k=>k!==cur);const defSrc=other.length?other[other.length-1]:'';
    h+=`<div class="sheet-bg" onclick="sheet=null;render()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-hdr"><span class="sheet-title">Pull Transactions</span><button class="sheet-close" onclick="sheet=null;render()">${IC.x}</button></div><div class="sheet-body">
    ${!other.length?'<div class="empty">No other months.</div>':`
    <div class="fg"><label class="fg-label">From</label><select class="fg-select" id="pSrc" onchange="renderPull()">${other.map(k=>`<option value="${k}"${k===defSrc?' selected':''}>${ml(k)}</option>`).join('')}</select></div>
    <div class="pull-info" id="pInfo">Select transactions below</div>
    <div style="display:flex;gap:8px;margin-bottom:10px"><button class="btn-full secondary" style="font-size:.85rem;padding:8px" onclick="togglePullAll()">Select All</button></div>
    <div id="pList" style="max-height:300px;overflow-y:auto"></div>
    <div style="height:12px"></div>
    <button class="btn-full primary" onclick="submitPull()">Pull Selected</button>`}
  </div></div></div>`}

  // Menu
  if(sheet==='menu'){h+=`<div class="sheet-bg" onclick="sheet=null;render()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-hdr"><span class="sheet-title">Options</span><button class="sheet-close" onclick="sheet=null;render()">${IC.x}</button></div><div class="sheet-body">
    <div class="menu-item" onclick="printReport()"><span class="menu-icon">${IC.print}</span>Print Report</div>
    <div class="menu-item" onclick="exportData()"><span class="menu-icon">${IC.dl}</span>Export Data</div>
    <div class="menu-item" onclick="document.getElementById('imp2').click()"><span class="menu-icon">${IC.ul}</span>Import Data<input type="file" id="imp2" accept=".json" style="display:none" onchange="importData(this.files[0])"></div>
    <div class="menu-item" onclick="createNewMonth();sheet=null"><span class="menu-icon">${IC.cal}</span>Create New Month</div>
    <div class="menu-item danger" onclick="deleteMonth()"><span class="menu-icon">${IC.trash}</span>Delete This Month</div>
  </div></div></div>`}

  document.getElementById('app').innerHTML=h;
  setTimeout(()=>{document.getElementById('aDesc')?.focus();document.getElementById('confInp')?.focus();if(sheet==='pull')renderPull()},50);
}

function toggleSel(id){if(selected.has(id))selected.delete(id);else selected.add(id);render()}
function submitAdd(){const day=Math.max(1,Math.min(31,parseInt(document.getElementById('aDay').value)||1)),desc=document.getElementById('aDesc').value.trim(),co=document.getElementById('aCo').value.trim(),cat=document.getElementById('aCat').value,type=document.getElementById('aType').value,freq=document.getElementById('aFreq').value,amt=parseFloat(document.getElementById('aAmt').value),note=document.getElementById('aNote').value.trim();if(!desc){alert('Description required.');return}if(isNaN(amt)){alert('Amount required.');return}addTxn({day,description:desc,company:co,category:cat,type,frequency:freq,projected:amt,note})}
function submitEdit(id){const day=Math.max(1,Math.min(31,parseInt(document.getElementById('eDay').value)||1)),desc=document.getElementById('eDesc').value.trim(),co=document.getElementById('eCo').value.trim(),cat=document.getElementById('eCat').value,type=document.getElementById('eType').value,freq=document.getElementById('eFreq').value,amt=parseFloat(document.getElementById('eAmt').value),note=document.getElementById('eNote').value.trim();if(!desc){alert('Description required.');return}if(isNaN(amt)){alert('Amount required.');return}updateTxn(id,{day,description:desc,company:co,category:cat,type,frequency:freq,projected:amt,note});sheet=null;editId=null;toast('Updated')}

function renderPull(){const src=document.getElementById('pSrc')?.value,el=document.getElementById('pList');if(!src||!el||!D.months[src])return;const txns=sortTxns(D.months[src].transactions);el.innerHTML=txns.map(t=>`<div class="pull-item" onclick="this.querySelector('input').checked=!this.querySelector('input').checked;updatePI()"><input type="checkbox" class="pull-cb" value="${t.id}" onclick="event.stopPropagation();updatePI()"><span class="pull-desc">${esc(t.description)}</span><span class="pull-amt" style="color:${t.projected>=0?'var(--green)':'var(--text)'}">${fmt(t.projected)}</span></div>`).join('');updatePI()}
function updatePI(){const cbs=document.querySelectorAll('.pull-cb:checked'),el=document.getElementById('pInfo');if(!el)return;if(!cbs.length){el.innerHTML='Select transactions below';return}let total=0;const src=document.getElementById('pSrc')?.value;cbs.forEach(cb=>{if(src&&D.months[src]){const t=D.months[src].transactions.find(t=>t.id===cb.value);if(t)total+=t.projected}});el.innerHTML=`<strong>${cbs.length} selected</strong> · Net: ${fmt(total)}`}
function togglePullAll(){const cbs=document.querySelectorAll('.pull-cb'),all=Array.from(cbs).every(cb=>cb.checked);cbs.forEach(cb=>cb.checked=!all);updatePI()}
function submitPull(){const src=document.getElementById('pSrc')?.value;if(!src)return;const ids=Array.from(document.querySelectorAll('.pull-cb:checked')).map(cb=>cb.value);if(!ids.length){alert('Select at least one.');return}pullTxns(src,ids)}

load();render();
</script>
</body>
</html>
